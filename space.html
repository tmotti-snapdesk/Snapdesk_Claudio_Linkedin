<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snapdesk LinkedIn — Espace</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏢%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="wrap">
    <div class="crumb" style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
      <a href="/">← Tous les espaces</a>
      <span class="userbar" id="userbar"></span>
    </div>
    <div id="store-warn"></div>
    <div id="head"></div>
    <div id="posts-zone"></div>
  </div>

  <!-- Modale d'édition d'un post -->
  <div id="edit-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
      <div class="modal-head">
        <h3 id="edit-modal-title">Modifier le post</h3>
        <button class="modal-close" id="edit-cancel" aria-label="Fermer">✕</button>
      </div>
      <textarea id="edit-modal-area" class="edit-area" spellcheck="true"></textarea>
      <div class="modal-foot">
        <span class="modal-hint">Astuce : Ctrl/⌘ + Entrée pour valider</span>
        <button class="btn" id="edit-cancel-2">Annuler</button>
        <button class="btn validate" id="edit-save">✓ Valider</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/assets/auth.js"></script>
  <script src="/assets/persona-editor.js"></script>
  <script>
    if (!Auth.requireAuth()) { throw new Error('redirect'); }
    Auth.renderUserBar(document.getElementById('userbar'));

    // Bouton « Mon persona » : chaque utilisateur peut ajuster sa voix / ajouter des posts.
    // Placé dans la barre utilisateur, juste avant le bouton « Déconnexion ».
    (function () {
      if (Auth.isAdmin()) return;               // l'admin édite les personas depuis /users.html
      const key = Auth.commercial();
      if (!key) return;
      const bar = document.getElementById('userbar');
      if (!bar) return;
      const btn = document.createElement('button');
      btn.className = 'btn small'; btn.textContent = '🎭 Mon persona';
      btn.addEventListener('click', () => PersonaEditor.open(key, { title: Auth.name() || Auth.user(), toast: toast }));
      const logout = bar.querySelector('#logout-btn');
      if (logout) bar.insertBefore(btn, logout); else bar.appendChild(btn);
    })();

    // --- Config commerciaux (ordre = affichage) ---
    const COMS = [
      { key: 'ronan',    name: 'Ronan',    role: 'CEO · Snapdesk',                        color: '#B67A2E' },
      { key: 'cyril',    name: 'Cyril',    role: 'Co-founder · Snapdesk',                 color: '#6B4E9E' },
      { key: 'melanie',  name: 'Mélanie',  role: 'Business Developer · Snapdesk',         color: '#2E7D57' },
      { key: 'florian',  name: 'Florian',  role: 'Business Developer · Snapdesk',         color: '#3A6EA5' },
      { key: 'maxence',  name: 'Maxence',  role: 'Commercial · Snapdesk',                 color: '#C24E3A' },
      { key: 'thomas',   name: 'Thomas',   role: 'Head of Marketing & Growth · Snapdesk', color: '#9B4D6E' },
      { key: 'snapdesk', name: 'Snapdesk', role: 'Compte officiel · l\'entreprise',       color: '#0E9E6E' },
    ];

    // --- Blocs personnels : chaque utilisateur a SA propre carte (clé = son pseudo).
    // Les 7 personas statiques ci-dessus restent réutilisables.
    const staticCom = (key) => COMS.find(c => c.key === String(key || '').toLowerCase());
    function colorFor(key) { let h = 0; const s = String(key || ''); for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0; return `hsl(${h % 360} 45% 42%)`; }
    function comFor(key, name, role) {
      if (!key) return null;
      const st = staticCom(key);
      if (st) return st;
      return { key: String(key).toLowerCase(), name: (name && name.trim()) || key, role: (role && role.trim()) || 'Snapdesk', color: colorFor(key) };
    }
    let VISIBLE_COMS = [];
    const findCom = (key) => VISIBLE_COMS.find(c => c.key === String(key || '').toLowerCase()) || comFor(key);

    // Un non-admin ne voit QUE son bloc perso ; un admin voit les 7 personas + le
    // bloc perso de chaque utilisateur actif (pour superviser / éditer leur contenu).
    async function buildVisibleComs() {
      if (!Auth.isAdmin()) {
        const me = comFor(Auth.commercial(), Auth.name() || Auth.user(), Auth.role());
        VISIBLE_COMS = me ? [me] : [];
        return;
      }
      const list = COMS.slice();
      try {
        const res = await Auth.fetch('/api/users', { cache: 'no-store' });
        const data = await res.json();
        (data.users || []).forEach(u => {
          if (u.admin || !u.commercial) return;
          if (list.find(c => c.key === u.commercial)) return; // persona statique déjà présent
          list.push(comFor(u.commercial, u.name || u.username, u.role));
        });
      } catch { /* /api/users indisponible → on garde au moins les personas statiques */ }
      VISIBLE_COMS = list;
    }

    const fmt = (s) => (s == null ? '' : String(s)).trim();
    const esc = (t) => fmt(t).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const params = new URLSearchParams(location.search);
    const SPACE_ID = params.get('id');

    let SPACE = null;

    // ---------- Mémoire PARTAGÉE (Supabase via /api/state) + repli localStorage ----------
    // STATE est chargé au démarrage depuis le serveur (partagé entre tous les PC).
    // Si le stockage partagé n'est pas configuré/joignable, on retombe sur localStorage
    // (mémoire par navigateur, comme avant) pour ne rien casser.
    let STATE = { posts: {}, dailyNote: '', history: [] };
    let SERVER_OK = false;
    let STORE_STATUS = { ok: true, error: '', code: '' };

    const LS_POSTS = `snapdesk_posts_${SPACE_ID}`;
    const LS_DAILY = `snapdesk_daily_${SPACE_ID}`;
    const LS_HIST = 'snapdesk_hook_history';
    const HISTORY_MAX = 60;
    const lsGet = (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } };

    function firstLine(text) {
      const line = String(text || '').split('\n').map(s => s.trim()).find(s => s.length > 0) || '';
      return line.slice(0, 160);
    }
    async function apiState(body) {
      try {
        const res = await Auth.fetch('/api/state', {
          method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body),
        });
        if (!res.ok) {
          let d = {}; try { d = await res.json(); } catch {}
          STORE_STATUS = { ok: false, error: (d && d.error) || ('HTTP ' + res.status), code: (d && d.code) || '' };
          showStoreWarning();
        }
        return res;
      } catch { /* réseau / redirection auth */ }
    }

    // Charge l'état (posts + note du jour + historique) pour l'espace courant.
    async function loadState() {
      try {
        const res = await Auth.fetch('/api/state?space=' + encodeURIComponent(SPACE_ID || ''), { cache: 'no-store' });
        let data = {}; try { data = await res.json(); } catch {}
        if (!res.ok || !data.ok) {
          STORE_STATUS = { ok: false, error: (data && data.error) || ('HTTP ' + res.status), code: (data && data.code) || '' };
          throw new Error(STORE_STATUS.error);
        }
        STATE = { posts: data.posts || {}, dailyNote: data.dailyNote || '', history: data.history || [] };
        SERVER_OK = true;
        STORE_STATUS = { ok: true, error: '', code: '' };
      } catch (e) {
        // Repli localStorage (par navigateur) — le partage ne fonctionne pas.
        SERVER_OK = false;
        if (STORE_STATUS.ok) STORE_STATUS = { ok: false, error: e.message || 'réseau', code: '' };
        STATE = { posts: lsGet(LS_POSTS, {}), dailyNote: localStorage.getItem(LS_DAILY) || '', history: lsGet(LS_HIST, []) };
      }
      showStoreWarning();
    }

    // Affiche (ou masque) un bandeau si la mémoire partagée n'est pas disponible.
    function showStoreWarning() {
      const el = document.getElementById('store-warn');
      if (!el) return;
      if (STORE_STATUS.ok) { el.innerHTML = ''; return; }
      const detail = STORE_STATUS.code === 'NO_STORE'
        ? "Supabase n'est pas vu par le serveur : vérifie SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY dans Vercel, puis fais un Redeploy."
        : `Détail : ${STORE_STATUS.error}`;
      el.innerHTML = `<div class="store-warn">⚠️ <b>Mémoire partagée indisponible</b> — le travail n'est PAS synchronisé entre les PC (repli mémoire locale du navigateur).<br>${esc(detail)}</div>`;
    }

    function loadSavedPosts() { return STATE.posts; }
    function savePostText(key, text) {
      STATE.posts[key] = text;
      if (SERVER_OK) apiState({ op: 'savePost', space: SPACE_ID, commercial: key, content: text });
      else localStorage.setItem(LS_POSTS, JSON.stringify(STATE.posts));
    }
    function removeSavedPost(key) {
      delete STATE.posts[key];
      if (SERVER_OK) apiState({ op: 'deletePost', space: SPACE_ID, commercial: key });
      else localStorage.setItem(LS_POSTS, JSON.stringify(STATE.posts));
    }
    function getDailyNote() { return STATE.dailyNote || ''; }
    let dailyT;
    function setDailyNote(v) {
      STATE.dailyNote = v;
      if (SERVER_OK) { clearTimeout(dailyT); dailyT = setTimeout(() => apiState({ op: 'saveDaily', space: SPACE_ID, content: v }), 500); }
      else localStorage.setItem(LS_DAILY, v);
    }
    function recordHook(author, postText) {
      const hook = firstLine(postText);
      if (!hook) return;
      STATE.history.push({ author, hook });
      STATE.history = STATE.history.slice(-HISTORY_MAX);
      if (SERVER_OK) apiState({ op: 'appendHook', author, hook });
      else localStorage.setItem(LS_HIST, JSON.stringify(STATE.history));
    }
    function recentHooksForPrompt() { return (STATE.history || []).slice(-30); }

    // ---------- Toast ----------
    let toastT;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(toastT);
      toastT = setTimeout(() => el.classList.remove('show'), 1800);
    }

    // ---------- Chargement de l'espace ----------
    function dispoClass(d) {
      const v = fmt(d).toLowerCase();
      if (!v) return '';
      return v.includes('dispo') ? 'ok' : 'soon';
    }

    // Câble le champ texte (note du jour / brief) : pré-rempli + sauvegardé à la frappe.
    function wireDailyNote() {
      const dn = document.getElementById('daily-note');
      if (!dn) return;
      dn.value = getDailyNote();
      let savedT;
      dn.addEventListener('input', () => {
        setDailyNote(dn.value);
        const tag = document.getElementById('daily-saved');
        if (tag) { tag.textContent = '✓ enregistré'; clearTimeout(savedT); savedT = setTimeout(() => { tag.textContent = ''; }, 1200); }
      });
    }

    function renderHead() {
      const s = SPACE;

      // --- Mode "post général" (hors espace) ---
      if (s.general) {
        document.getElementById('head').innerHTML = `
          <div class="space-head">
            <div class="row">
              <div>
                <p class="eyebrow">Post général</p>
                <h1>Posts LinkedIn — hors espace</h1>
              </div>
            </div>
            <p class="desc">Chaque membre génère un post LinkedIn qui n'est lié à aucun espace. Donne un sujet / brief (optionnel), puis clique « Générer le post » du membre voulu.</p>
            <div class="daily">
              <label for="daily-note">📝 Sujet / brief du post <span>— de quoi veux-tu parler ? (tendance, actualité, conseil, prise de position…). Laisse vide pour laisser le membre choisir son angle.</span></label>
              <textarea id="daily-note" placeholder="Ex. : le retour au bureau · l'importance du design des bureaux · un conseil pour bien choisir ses locaux · réagir à une actu du flex office…"></textarea>
              <div class="saved" id="daily-saved"></div>
            </div>
          </div>`;
        wireDailyNote();
        return;
      }

      // --- Mode "espace" ---
      const facts = [];
      if (fmt(s.postes)) facts.push(`<span class="pill">${esc(s.postes)} postes</span>`);
      if (fmt(s.superficie)) facts.push(`<span class="pill">${esc(s.superficie)}</span>`);
      if (fmt(s.prix)) facts.push(`<span class="pill">${esc(s.prix)}</span>`);
      if (fmt(s.localisation)) facts.push(`<span class="pill">${esc(s.localisation)}</span>`);
      const dispo = fmt(s.disponibilite) ? `<span class="dispo ${dispoClass(s.disponibilite)}">${esc(s.disponibilite)}</span>` : '';
      document.getElementById('head').innerHTML = `
        <div class="space-head">
          <div class="row">
            <div>
              <p class="eyebrow">Espace</p>
              <h1>${esc(s.espace)}</h1>
            </div>
            <button id="reload-space" class="btn primary" title="Relit les infos de l'espace (les posts se génèrent à la demande)">↻ Recharger l'espace</button>
          </div>
          <div class="facts">${facts.join('')}${dispo}</div>
          ${fmt(s.description) ? `<p class="desc">${esc(s.description)}</p>` : ''}
          ${(fmt(s.drive) || fmt(s.presentation)) ? `<div class="resources">
            ${fmt(s.drive) ? `<a class="btn small resource-btn" href="${esc(s.drive)}" target="_blank" rel="noopener noreferrer">📸 Photos &amp; Vidéos</a>` : ''}
            ${fmt(s.presentation) ? `<button class="btn small" id="copy-presentation">🔗 Copier le lien de la landing page</button>` : ''}
          </div>` : ''}
          <div class="daily">
            <label for="daily-note">📌 Information complémentaire du jour <span>— oriente les posts générés ci-dessous (actualité, promo, événement, angle du jour…)</span></label>
            <textarea id="daily-note" placeholder="Ex. : canicule aujourd'hui → insister sur la clim et les terrasses · ou « portes ouvertes jeudi », « -1 mois offert cette semaine », « nouvelle photo dispo »…"></textarea>
            <div class="saved" id="daily-saved"></div>
          </div>
        </div>`;
      document.getElementById('reload-space').addEventListener('click', reloadSpace);
      // Lien de présentation : bouton "copier".
      const cp = document.getElementById('copy-presentation');
      if (cp) cp.addEventListener('click', () => copyText(SPACE.presentation, '✓ Lien de la landing page copié'));
      wireDailyNote();
    }

    async function fetchSpace() {
      const res = await Auth.fetch('/api/spaces', { cache: 'no-store' });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Erreur /api/spaces');
      const found = (data.spaces || []).find(x => x.id === SPACE_ID);
      if (!found) throw new Error("Espace introuvable (a-t-il été supprimé de la base ?)");
      return found;
    }

    // ---------- Rendu des cartes ----------
    function cardShell(com, inner, statusHtml, actionsHtml) {
      return `
        <article class="post" id="post-${com.key}">
          <div class="post-top">
            <div class="avatar" style="background:${com.color}">${esc(com.name[0])}</div>
            <div class="who"><span class="n">${esc(com.name)}</span><span class="r">${esc(com.role)}</span></div>
          </div>
          <div class="post-body" id="body-${com.key}">${inner}</div>
          ${statusHtml || ''}
          <div class="post-actions">${actionsHtml}</div>
        </article>`;
    }

    function skeletonBody() {
      return `<div class="skeleton" style="width:90%"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:95%"></div><div class="skeleton" style="width:60%"></div>`;
    }

    // État "au repos" : rien n'est généré tant qu'on ne clique pas (1 requête par clic).
    function renderPostsIdle() {
      const zone = document.getElementById('posts-zone');
      // Non-admin sans bloc attribué : rien à générer.
      if (!Auth.isAdmin() && VISIBLE_COMS.length === 0) {
        zone.innerHTML = `<div class="notice">Aucun bloc ne t'est attribué pour l'instant. Demande à un administrateur de t'associer à un persona.</div>`;
        return;
      }
      const intro = Auth.isAdmin()
        ? `Clique sur « ✨ Générer le post » du commercial voulu. Les posts se créent <b>un par un, à la demande</b> (pour ménager le quota de l'API).`
        : `Ton bloc de création. Clique sur « ✨ Générer le post » pour créer ta publication.`;
      const single = VISIBLE_COMS.length === 1 ? ' single' : '';
      zone.innerHTML =
        `<div class="notice">${intro}</div>` +
        `<div class="posts${single}">${
          VISIBLE_COMS.map(c => cardShell(
            c,
            `<span style="color:var(--taupe); font-style:italic;">Pas encore généré.</span>`,
            '',
            `<button class="btn small brass gen-one" style="flex:1">✨ Générer le post</button>`
          )).join('')
        }</div>`;
      VISIBLE_COMS.forEach(c => {
        const card = document.getElementById(`post-${c.key}`);
        const b = card && card.querySelector('.gen-one');
        if (b) b.addEventListener('click', () => generateOne(c.key));
      });
      // Restaure les posts déjà générés (persistés localement) : ils restent
      // affichés tant qu'on ne clique pas Régénérer.
      const saved = loadSavedPosts();
      VISIBLE_COMS.forEach(c => { if (saved[c.key]) fillCard(c, { post: saved[c.key] }); });
    }

    function fillCard(com, entry) {
      const card = document.getElementById(`post-${com.key}`);
      if (!card) return;
      const body = card.querySelector('.post-body');
      const actions = card.querySelector('.post-actions');
      const old = card.querySelector('.post-status');
      if (old) old.remove();

      let statusHtml = '', bodyHtml = '', canCopy = false;
      if (entry && entry.error) {
        body.classList.add('muted');
        bodyHtml = `⚠️ ${esc(entry.error)}`;
        statusHtml = `<div class="post-status err">erreur</div>`;
      } else if (entry && entry.skipped) {
        body.classList.add('muted');
        bodyHtml = esc(entry.post || 'Config à compléter.');
        statusHtml = `<div class="post-status skip">à configurer</div>`;
      } else if (entry && entry.post) {
        body.classList.remove('muted');
        bodyHtml = esc(entry.post);
        statusHtml = `<div class="post-status ok">prêt</div>`;
        canCopy = true;
      } else {
        body.classList.add('muted');
        bodyHtml = 'Aucun contenu.';
      }
      body.innerHTML = bodyHtml;
      actions.insertAdjacentHTML('beforebegin', statusHtml);

      actions.innerHTML =
        `<button class="btn small copy" ${canCopy ? '' : 'disabled'}>Copier</button>` +
        `<button class="btn small regen">🔄 Régénérer</button>` +
        (canCopy ? `<button class="btn small edit">✏️ Modifier</button>` : '') +
        (canCopy ? `<button class="btn small danger del">🗑 Supprimer</button>` : '');
      if (canCopy) {
        actions.querySelector('.copy').addEventListener('click', () => copyText(entry.post));
        actions.querySelector('.edit').addEventListener('click', () => enterEdit(com.key));
        actions.querySelector('.del').addEventListener('click', () => deleteOne(com.key));
      }
      actions.querySelector('.regen').addEventListener('click', () => generateOne(com.key));
    }

    // ---------- Édition dans une fenêtre centrée (modale, animée) ----------
    let editingKey = null;

    function openEditModal() {
      const el = document.getElementById('edit-modal');
      el.style.display = 'flex';
      void el.offsetWidth;            // reflow → déclenche la transition d'entrée
      el.classList.add('show');
      el.setAttribute('aria-hidden', 'false');
    }
    function closeEditModal() {
      const el = document.getElementById('edit-modal');
      el.classList.remove('show');
      el.setAttribute('aria-hidden', 'true');
      setTimeout(() => { if (!el.classList.contains('show')) el.style.display = 'none'; }, 220);
      editingKey = null;
    }

    // "Modifier" : ouvre la modale centrée avec le texte du post.
    function enterEdit(key) {
      const com = findCom(key);
      if (!com) return;
      editingKey = key;
      const saved = loadSavedPosts()[key];
      const bodyCard = document.getElementById(`post-${key}`);
      const bodyEl = bodyCard ? bodyCard.querySelector('.post-body') : null;
      const current = (saved != null) ? saved : (bodyEl ? bodyEl.textContent : '');
      document.getElementById('edit-modal-title').textContent = `Modifier le post — ${com.name}`;
      const ta = document.getElementById('edit-modal-area');
      ta.value = current;
      openEditModal();
      setTimeout(() => { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }, 80);
    }

    // "Valider" : sauvegarde (persisté) + met à jour la carte + ferme la modale.
    function saveEdit() {
      if (!editingKey) { closeEditModal(); return; }
      const com = findCom(editingKey);
      const text = String(document.getElementById('edit-modal-area').value).trim();
      if (text) {
        savePostText(editingKey, text);
        fillCard(com, { post: text });
        toast('Post modifié');
      }
      closeEditModal();
    }

    // Câblage de la modale (une seule fois).
    document.getElementById('edit-save').addEventListener('click', saveEdit);
    document.getElementById('edit-cancel').addEventListener('click', closeEditModal);
    document.getElementById('edit-cancel-2').addEventListener('click', closeEditModal);
    document.getElementById('edit-modal').addEventListener('click', (e) => { if (e.target.id === 'edit-modal') closeEditModal(); });
    document.addEventListener('keydown', (e) => {
      const open = document.getElementById('edit-modal').classList.contains('show');
      if (!open) return;
      if (e.key === 'Escape') closeEditModal();
      else if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); saveEdit(); }
    });

    // Remet une carte au repos (bouton "Générer le post").
    function setCardIdle(com) {
      const card = document.getElementById(`post-${com.key}`);
      if (!card) return;
      const body = card.querySelector('.post-body');
      body.classList.add('muted');
      body.innerHTML = `<span style="color:var(--taupe); font-style:italic;">Pas encore généré.</span>`;
      const old = card.querySelector('.post-status');
      if (old) old.remove();
      const actions = card.querySelector('.post-actions');
      actions.innerHTML = `<button class="btn small brass gen-one" style="flex:1">✨ Générer le post</button>`;
      actions.querySelector('.gen-one').addEventListener('click', () => generateOne(com.key));
    }

    // Supprime le post d'un commercial (affichage + persistance) → carte au repos.
    function deleteOne(key) {
      removeSavedPost(key);
      const com = findCom(key);
      setCardIdle(com);
      toast('Post supprimé');
    }

    async function copyText(text, msg = '✓ Post copié') {
      try {
        await navigator.clipboard.writeText(text);
        toast(msg);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); toast(msg); } catch { toast('Copie impossible'); }
        ta.remove();
      }
    }

    // ---------- Génération ----------
    function spacePayload() {
      const s = SPACE;
      if (s.general) return { general: true, dailyNote: getDailyNote() };
      return {
        url: s.url, localisation: s.localisation, espace: s.espace, prix: s.prix,
        postes: s.postes, superficie: s.superficie, disponibilite: s.disponibilite,
        description: s.description,
        dailyNote: getDailyNote(),
      };
    }

    async function callGenerate(commercials) {
      const res = await Auth.fetch('/api/generate', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ space: spacePayload(), commercials, history: recentHooksForPrompt() }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data.posts || {};
    }

    // Génère (ou régénère) le post d'UN seul commercial → 1 requête API.
    async function generateOne(key) {
      const com = findCom(key);
      const card = document.getElementById(`post-${key}`);
      if (!card) return;
      // Passe la carte en chargement + désactive ses boutons le temps de la requête.
      card.querySelector('.post-body').innerHTML = skeletonBody();
      const old = card.querySelector('.post-status');
      if (old) old.remove();
      card.querySelectorAll('.post-actions .btn').forEach(b => { b.disabled = true; });
      try {
        const posts = await callGenerate([key]);
        const entry = posts[key];
        fillCard(com, entry);
        if (entry && entry.post && !entry.skipped && !entry.error) {
          savePostText(key, entry.post); // persiste : reste au retour sur la page
          recordHook(com.name, entry.post); // mémorise l'accroche pour éviter les répétitions
          toast('Post généré');
        }
      } catch (err) {
        fillCard(com, { error: err.message });
      }
    }

    // ---------- Recharger l'espace (relit les infos + régénère) ----------
    async function reloadSpace() {
      const btn = document.getElementById('reload-space');
      if (btn) { btn.disabled = true; btn.textContent = '↻ Rechargement…'; }
      try {
        SPACE = await fetchSpace();
        await loadState();
        renderHead();
        renderPostsIdle();
        toast('Infos espace relues');
      } catch (err) {
        document.getElementById('posts-zone').innerHTML = `<div class="error-box">${esc(err.message)}</div>`;
      }
    }

    // ---------- Init ----------
    async function init() {
      if (!SPACE_ID) {
        document.getElementById('head').innerHTML = `<div class="error-box">Aucun espace indiqué. <a href="/">Retour à la liste</a></div>`;
        return;
      }
      await buildVisibleComs();
      // Mode "post général" (hors espace) : rien à charger côté Sheet.
      if (SPACE_ID === '__general__') {
        SPACE = { general: true };
        await loadState();
        renderHead();
        renderPostsIdle();
        return;
      }
      try {
        SPACE = await fetchSpace();
        await loadState();
        renderHead();
        renderPostsIdle();
      } catch (err) {
        document.getElementById('head').innerHTML = `<div class="error-box">${esc(err.message)} — <a href="/">retour</a></div>`;
      }
    }
    init();
  </script>
</body>
</html>
